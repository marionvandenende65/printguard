<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wachtwoord instellen — PrintGuard</title>
<style>
  :root { --ink:#0f0e0d; --ink-muted:#7a776f; --paper:#f7f4ef; --border:#d0cbc3; --accent:#c8531a; --font-mono:'Courier New',monospace; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--paper); color:var(--ink); font-family:Georgia,serif; min-height:100vh; display:flex; flex-direction:column; }
  nav { display:flex; align-items:center; padding:1.5rem 3rem; border-bottom:0.5px solid var(--border); }
  .logo { font-family:var(--font-mono); font-size:13px; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; color:var(--ink); }
  .logo span { color:var(--accent); }
  .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1rem; }
  .box { background:#fff; border:0.5px solid var(--border); padding:2.5rem 2rem; max-width:400px; width:100%; }
  .box-label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); margin-bottom:1rem; }
  h1 { font-size:1.4rem; font-weight:300; margin-bottom:1.5rem; }
  label { display:block; font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:6px; }
  input { width:100%; padding:10px 12px; border:0.5px solid var(--border); background:var(--paper); font-family:var(--font-mono); font-size:12px; color:var(--ink); border-radius:2px; outline:none; margin-bottom:1rem; }
  input:focus { border-color:var(--accent); }
  button { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; border-radius:2px; }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  #status { font-family:var(--font-mono); font-size:11px; margin-top:12px; line-height:1.6; }
  .err  { color:var(--accent); }
  .ok   { color:#2e7d32; }
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">Print<span>Guard</span></a>
</nav>

<div class="wrap">
  <div class="box">
    <div class="box-label">Beveiliging</div>
    <h1>Nieuw wachtwoord instellen</h1>

    <div id="formWrap">
      <label for="pw1">Nieuw wachtwoord</label>
      <input id="pw1" type="password" placeholder="Minimaal 8 tekens" autocomplete="new-password">
      <label for="pw2">Herhaal wachtwoord</label>
      <input id="pw2" type="password" placeholder="Zelfde wachtwoord" autocomplete="new-password">
      <button id="btn" onclick="doReset()">Wachtwoord opslaan</button>
      <p id="status"></p>
    </div>

    <div id="successWrap" style="display:none;text-align:center;">
      <p style="color:#2e7d32;font-family:var(--font-mono);font-size:12px;line-height:1.8;margin-bottom:1.5rem;">
        Uw wachtwoord is bijgewerkt.<br>U kunt nu inloggen.
      </p>
      <a href="/" style="font-family:var(--font-mono);font-size:11px;color:var(--accent);text-decoration:none;letter-spacing:0.05em;">
        → Naar de site
      </a>
    </div>
  </div>
</div>

<script>
  const token = new URLSearchParams(location.search).get('token') || '';
  if (!token) {
    document.getElementById('status').textContent = 'Ongeldige link. Vraag een nieuwe reset-mail aan.';
    document.getElementById('status').className = 'err';
    document.getElementById('btn').disabled = true;
  }

  async function doReset() {
    const pw1    = document.getElementById('pw1').value;
    const pw2    = document.getElementById('pw2').value;
    const status = document.getElementById('status');
    const btn    = document.getElementById('btn');

    if (pw1.length < 8) {
      status.textContent = 'Wachtwoord moet minimaal 8 tekens zijn.';
      status.className = 'err';
      return;
    }
    if (pw1 !== pw2) {
      status.textContent = 'Wachtwoorden komen niet overeen.';
      status.className = 'err';
      return;
    }

    btn.disabled = true;
    status.textContent = '';

    try {
      const res  = await fetch('/api/reset-password', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({token, password: pw1}),
      });
      const data = await res.json();
      if (data.ok) {
        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('successWrap').style.display = 'block';
      } else {
        status.textContent = data.error || 'Er is iets misgegaan. Vraag een nieuwe reset-mail aan.';
        status.className = 'err';
        btn.disabled = false;
      }
    } catch(e) {
      status.textContent = 'Verbindingsfout. Probeer het opnieuw.';
      status.className = 'err';
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doReset();
  });
</script>
</body>
</html>
